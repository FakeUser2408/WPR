# Prevents Supabase free-tier project from pausing due to inactivity (pauses after ~7 days idle).
# Runs daily at 06:00 UTC. Also trigger manually: Actions → Supabase Keep Alive → Run workflow.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL          e.g. https://fjcpbyjbhnedvieheeng.supabase.co
#   SUPABASE_ANON_KEY     your publishable/anon key

name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping keep-alive edge function
        run: |
          curl -fsS --retry 3 --retry-delay 10 -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/keep-alive" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Ping Supabase REST API
        run: |
          curl -fsS --retry 3 --retry-delay 10 \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
