# Prevents Supabase free-tier project from pausing due to inactivity (pauses after ~7 days idle).
# Runs daily at 06:00 UTC. Manual run: Actions → Supabase Keep Alive → Run workflow.
#
# GitHub repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL        https://YOUR_PROJECT.supabase.co  (no trailing slash)
#   SUPABASE_ANON_KEY   publishable or anon key from Supabase Dashboard → API

name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase project
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "ERROR: Set SUPABASE_URL and SUPABASE_ANON_KEY in GitHub Actions secrets."
            exit 1
          fi

          URL="${SUPABASE_URL%/}"
          echo "Pinging $URL"

          try_ping() {
            local name="$1"
            local endpoint="$2"
            local method="${3:-GET}"
            local http_code

            echo "--- $name ---"
            echo "URL: $endpoint"

            if [ "$method" = "POST" ]; then
              http_code=$(curl -sS -o /tmp/ping_body.txt -w "%{http_code}" -X POST "$endpoint" \
                -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
                -H "apikey: $SUPABASE_ANON_KEY" \
                -H "Content-Type: application/json" \
                -d '{}')
            else
              http_code=$(curl -sS -o /tmp/ping_body.txt -w "%{http_code}" "$endpoint" \
                -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
                -H "apikey: $SUPABASE_ANON_KEY")
            fi

            cat /tmp/ping_body.txt || true
            echo ""
            echo "HTTP $http_code"

            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "SUCCESS via $name"
              exit 0
            fi
          }

          # 1) REST API — works with publishable/anon key
          try_ping "REST wpr_analyses" \
            "$URL/rest/v1/wpr_analyses?select=id&limit=1"

          # 2) keep-alive edge function
          try_ping "keep-alive" "$URL/functions/v1/keep-alive" POST

          # 3) get-analyses edge function
          try_ping "get-analyses" "$URL/functions/v1/get-analyses"

          echo "ERROR: All ping methods failed."
          echo "Check secrets: SUPABASE_URL and SUPABASE_ANON_KEY (publishable key from Supabase Dashboard → API)."
          exit 1
